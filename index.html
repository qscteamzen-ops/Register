<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนเรียน/เทรน</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
    .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button:disabled { background-color: #ccc; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>ฟอร์มลงทะเบียนเทรน</h2>
  <form id="regForm">
    <input type="hidden" id="lineUid"> <div class="form-group">
      <label>หมายเลขบัตรประชาชน:</label>
      <input type="text" id="citizenId" maxlength="13" required pattern="\d{13}">
    </div>
    <div class="form-group">
      <label>รหัสพนักงาน:</label>
      <input type="text" id="employeeId" required>
    </div>
    <div class="form-group">
      <label>ชื่อ-นามสกุล:</label>
      <input type="text" id="fullName" required>
    </div>
    <div class="form-group">
      <label>สาขา:</label>
      <input type="text" id="branch" required>
    </div>
    <div class="form-group">
      <label>ตำแหน่ง:</label>
      <input type="text" id="position" required>
    </div>
    <div class="form-group">
      <label>หลักสูตรที่เรียน:</label>
      <input type="text" id="courseName" required>
    </div>
    <div class="form-group">
      <label>วันที่เข้าเรียน:</label>
      <input type="date" id="trainingDate" required>
    </div>
    
    <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
  </form>
</div>

<script>
  // 1. วาง URL ของ Google Apps Script ที่ก๊อปปี้มาที่นี่
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzrudFyZSKBLM3F4u0PT8JEKVu2-SnvIuc7WqaA9YThU1y8sEoO_tWporPo02mpmzaF/exec"; 
  
  // 2. วาง LIFF ID ของคุณที่นี่
  const LIFF_ID = "2010369146-FPwbCdVS"; 

  // เริ่มทำงานเมื่อเปิดหน้าเว็บ
  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        document.getElementById('lineUid').value = profile.userId; // ดึง UID มาเก็บไว้
      } else {
        liff.login(); // ถ้ายังไม่ Login ให้เด้งหน้า Login ของ LINE
      }
    } catch (error) {
      console.error("LIFF นำเข้าข้อมูลไม่สำเร็จ", error);
    }
  }
  main();

  // จัดการเมื่อกดส่งฟอร์ม
  document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = "กำลังบันทึก...";

    // ดึงค่าจากฟอร์ม
    const formData = {
      citizenId: document.getElementById('citizenId').value,
      employeeId: document.getElementById('employeeId').value,
      fullName: document.getElementById('fullName').value,
      branch: document.getElementById('branch').value,
      position: document.getElementById('position').value,
      courseName: document.getElementById('courseName').value,
      trainingDate: document.getElementById('trainingDate').value,
      lineUid: document.getElementById('lineUid').value
    };

    try {
      // ส่งข้อมูลไปยัง Google Apps Script
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(formData)
      });
      const result = await response.json();

      if (result.status === 'success') {
        alert('ลงทะเบียนสำเร็จแล้ว!');
        liff.closeWindow(); // บันทึกเสร็จแล้วปิดหน้าต่าง LIFF ทันที
      } else {
        alert('เกิดข้อผิดพลาด: ' + result.message);
        submitBtn.disabled = false;
        submitBtn.innerText = "บันทึกข้อมูล";
      }
    } catch (error) {
      alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
      submitBtn.disabled = false;
      submitBtn.innerText = "บันทึกข้อมูล";
    }
  });
</script>

</body>
</html>
